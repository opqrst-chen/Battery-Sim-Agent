SYSTEM_PROMPT: |-
  You are a battery parameter expert with extensive experience and expertise in adjusting battery parameters and are proficient in the PyBaMM simulation tool.
  You can adjust battery parameters based on the actual battery capacity degradation to ensure that simulation results match actual results.


FIRST_CYCLE_PROMPT:
  FIRST_ROUND_PROMPT: |-
    I want to simulate a real battery using Pybamm, and I plan to adjust the parameters so that the current and voltage curves look consistent.

    The charge and discharge protocol I use is as follows: {{ protocols }}
    I hope you can use your existing knowledge about these parameters and summarize how adjusting these parameters will change the capacity and how the current-voltage curve will change.

    I hope you can adjust the parameters based on your knowledge and these rules, as well as the capacity and curve of the battery under the current parameters, so that the simulated curve is closer to the real one. These are the current parameters.

    You need to adjust these parameters to make the curve of the first circle close.  If necessary, you can also change other parameters.

    params = {{ current_params }} And other parameter would follow {{ parameter_set }} parameter set values.

    The upper picture shows the current changing with time curve, and the lower picture shows the voltage changing with time curve. The yellow one is the real battery curve, and the blue one is the curve generated by the {{ model_name }} model with the current parameters. Please first describe the difference between the blue and yellow curves in the figure, and summarize the direction in which the parameters need to be optimized, then adjust the parameters, and return the parameters and values that need to be adjusted.

    {{ cycle_description }}

    We need to ensure that the capacity and the time of different steps (such as constant current charging) are the same between the simulated data and the real data.


  TEXT_KNOWLEDGE: |-
    And here are some patterns that test by experiment by us:

    For Electrode Width [m], If the value is increased, the corresponding battery capacity will increase, and if the value is decreased, the corresponding battery capacity will decrease. For Negative Electrode Active Material Volume Fraction, If the value is increased, the corresponding battery capacity will increase, and if the value is decreased, the corresponding battery capacity will decrease. At the same time, decreasing the value will increase the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease. Note that the Negative Electrode Active Material Volume Fraction should be larger than the Positive Electrode Active Material Volume Fraction. For Positive Electrode Active Material Volume Fraction, If the value is increased and decreased, the corresponding battery capacity will not change significantly. At the same time, decreasing the value will increase the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease. For Negative Electrode Thickness [m], If the value is increased, the corresponding battery capacity will increase, and if the value is decreased, the corresponding battery capacity will decrease. At the same time, decreasing the value will increase the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease significantly. Note that if the value is too large, it will cause errors. For Positive Electrode Thickness [m], If the value is increased and decreased, the corresponding battery capacity will not change significantly. At the same time, decreasing the value will decrease the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will not change significantly. For Maximum Concentration in Negative Electrode [mol.m^-3], If the value is increased and decreased, the corresponding battery capacity will not change significantly. At the same time, decreasing the value will increase the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease. Note that the maximum concentration must be greater than the initial concentration. For Maximum Concentration in Positive Electrode [mol.m^-3], If the value is increased, the corresponding battery capacity will increase, and if the value is decreased, the corresponding battery capacity will decrease. At the same time, increasing the value will decrease the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease. Note that the maximum concentration must be greater than the initial concentration, and slight adjustments may cause errors. For Initial Concentration in Negative Electrode [mol.m^-3] If the value is increased, the corresponding battery capacity will increase, and if the value is decreased, the corresponding battery capacity will decrease. At the same time, decreasing the value will decrease the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease. For Initial Concentration in Positive Electrode [mol.m^-3], If the value is increased, the corresponding battery capacity will decrease, and if the value is decreased, the corresponding battery capacity will increase. At the same time, decreasing the value will decrease the relative proportion of the constant voltage (CV) stage in the charge stage, while the relative proportion of the constant current (CC) stage will decrease.

    The params should just in {{ search_keys }}, I hope you can summarize the above results and suggest the next 1 updated params group with new values as dict (without name) in JSON format.

  SEARCH_KNOWLEDGE: |-
    I want to explore and gather the knowledge from first 20 groups results. You can only modify some parameters in this list {{ search_keys }}. Give me a series of parameter adjustment (about 20 groups) in JSON format for me to execute using pybamm first. Please do not add any invalid comments for JSON.

  OTHER_ROUND_PROMPT: |-
    Here are the results:
    {{ cycle_description }}

    The params should just in {{ search_keys }}, I hope you can summarize the above results and suggest the next 1 updated params group with new values as dict (without name) in JSON format.


DEGREDATION_PROMPT:
  FIRST_ROUND_PROMPT: |-
    I want to simulate a real battery degradation using Pybamm, and I plan to adjust the SEI parameters so that the current and voltage curves of every cycle look consistent.

    The initial settings are the same, so the first cycle of real and simulated data are the same. From cycle 2, we want to adjust SEI params to keep real and simulated data look same. I will provide the corresponding cycle number {{ cycle_idxs }} and the corresponding real and simulated information.

    The charge and discharge protocol I use is as follows: {{ protocols }}

    I hope you can use your existing knowledge about these parameters {{ search_keys }} and summarize how adjusting these parameters will change the degradation capacity and how the current-voltage curve will change.

    You need to adjust these parameters to make the curve of the {{ cycle_idxs }} close.

    curent params = {{ current_params }} and other parameter would follow {{ parameter_set }} parameter set values.

    {{ cycle_description }}

    We need to ensure that the capacity and the time of different steps (such as constant current charging) are the same between the simulated data and the real data of each cycle.


  TEXT_KNOWLEDGE: |-
    And here are some patterns that test by experiment by us:
    Higher solvent concentration (bulk_solvent_concentration_mol_m-3) accelerates side reactions like the SEI, leading to greater degradation.
    A higher lithium-to-SEI molar ratio (ratio_of_lithium_moles_to_SEI_moles) increases the active lithium consumption efficiency and accelerates capacity degradation.
    Increasing the initial EC concentration in the electrolyte (EC_initial_concentration_in_electrolyte_mol_m-3) generally results in larger initial capacity and impedance decay, with a downward-convex curve.
    A higher SEI solvent diffusivity (SEI_solvent_diffusivity_m2_s-1) increases the degradation rate and magnitude.
    A higher EC diffusivity (EC_diffusivity_m2_s-1) accelerates the degradation rate and results in a downward-convex curve.
    A higher initial SEI thickness (initial_SEI_thickness_m) slows the degradation rate and minimizes the degradation. The larger the SEI partial molar volume (SEI_partial_molar_volume_m3_mol-1), the slower and larger the degradation.

    The params should just in {{ search_keys }}, I hope you can summarize the above results and suggest the next 1 updated params group with new values as dict (without name) in JSON format.

  SEARCH_KNOWLEDGE: |-
    I want to explore and gather the knowledge from first 10 groups results. You can only modify some parameters in this list {{ search_keys }}. Give me a series of parameter adjustment (about 10 groups) in JSON format for me to execute using pybamm first. Please do not add any invalid comments for JSON.

  OTHER_ROUND_PROMPT: |-
    Here are the results:
    {{ cycle_description }}

    The params should just in {{ search_keys }}, I hope you can summarize the above results and suggest the next 1 updated params group with new values as dict (without name) in JSON format.


MULTI_VOTE:
  SYSTEM_PROMPT: |-
    You are a battery parameter expert with extensive experience adjusting battery parameters and proficient in the PyBaMM simulation tool. You will receive several parameter-adjustment suggestions (in JSON format) produced by independent reasoning runs. Your task is to perform majority voting (or weighted merging) over these suggestions and emit a single final adjustment proposal.
  USER_PROMPT: |-
    Below are several LLM-generated parameter-adjustment suggestions. Each suggestion is a JSON object containing three fields: diff, diff_reason, params_to_update.

    Your task:
    1. For diff and diff_reason: if the per-round results agree or differ only slightly, take the majority value; if they differ substantially, take the average and keep the original structure.
    2. For params_to_update:
       - Group by parameter name; for each parameter count the occurrences of value_amplitude and pick the most frequent one.
       - If the value_amplitude values disagree but are close, take the average (rounded to an integer percentage).
       - Compute value as final value_amplitude * original parameter value (original values are provided by me) and keep scientific notation (e.g., 1.2e-09).
       - For reason, merge the majority explanations; if reasons differ, combine them into a single concise sentence.
    3. Output only the final JSON object in the schema:
       {"diff": [...], "diff_reason": [...], "params_to_update": [...]}
       Do not output any additional explanation or text.

    The multi-round suggestions follow:
    <all_suggestions>
    {{ all_suggestions }}
    </all_suggestions>

    Apply the rules above and return the final merged JSON.
